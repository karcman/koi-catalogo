<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koi - Catalogo de Camisetas</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jacquard+24&display=swap" rel="stylesheet">

    <style>
        /* --- ESTILOS BASE (PENSADOS PARA MÓVIL) --- */
        body {
            /* Mantenemos tu fondo */
            background-image: url('imagenes/fondokoi2completo.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: #0D4272; /* Color de texto de tu logo */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px; /* Menos padding en móvil */
            box-sizing: border-box;
        }

        /* TIPOGRAFÍA JACQUARD */
        h1, h2, .botones-filtro button {
            font-family: "Jacquard 24", system-ui;
            font-weight: 400;
            font-style: normal;
            letter-spacing: 1px;
            text-align: center;
        }

        header { margin-bottom: 20px; text-align: center; }
        
        /* Título grande pero adaptable */
        h1 { font-size: 3rem; margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        header p { margin: 0; font-size: 0.9rem; font-weight: bold; }

        /* CONTROLES (BUSCADOR Y FILTROS) */
        .controles { max-width: 500px; margin: 0 auto 20px auto; }
        
        #buscador {
            width: 100%;
            padding: 12px;
            border-radius: 25px; /* Más redondeado, estilo app moderno */
            border: 2px solid #0D4272;
            margin-bottom: 10px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .botones-filtro {
            display: flex;
            justify-content: center;
            flex-wrap: wrap; /* Para que bajen si no caben en móvil */
            gap: 5px;
        }

        .botones-filtro button {
            background-color: white;
            color: #052447;
            border: 2px solid #052447;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .botones-filtro button:hover { background-color: #052447; color: white; }

        /* --- LA VITRINA (GRID DE PORTADAS) --- */
        #contenedor-vitrina {
            display: grid;
            /* Móvil: 1 columna por defecto */
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* TARJETA DE PORTADA (Hacemos clic en toda la tarjeta) */
        .tarjeta-portada {
            background-color: #122c47; /* Tu azul oscuro */
            border-radius: 12px;
            overflow: hidden; /* Para que la foto respete los bordes redondeados */
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            text-decoration: none; /* Quita el subrayado del enlace */
            color: white; /* Texto blanco dentro de la tarjeta */
            display: flex;
            flex-direction: column;
            transition: transform 0.2s; /* Pequeño efecto visual al tocar */
        }

        .tarjeta-portada:active { transform: scale(0.98); } /* Efecto de "presionado" en móvil */

        /* Título de la camiseta en la portada */
        .tarjeta-portada h2 {
            font-size: 1.3rem;
            margin: 10px 0;
            padding: 0 5px;
            line-height: 1.1;
        }

        /* Foto de portada única */
        .foto-portada {
            width: 100%;
            aspect-ratio: 4 / 5; /* Mantiene el formato vertical original */ /* Altura fija para que todas se vean parejas */
            object-fit: cover; /* Ajusta la foto sin deformarla */
            loading: lazy; /* Carga perezosa para velocidad */
        }

        /* --- MEDIA QUERY: AJUSTES PARA PANTALLAS GRANDES (PC) --- */
        @media (min-width: 600px) {
            body { padding: 20px; }
            h1 { font-size: 5rem; }
            
            /* En PC, la vitrina se vuelve mosaico */
            #contenedor-vitrina {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 25px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Bienvenido a Koi</h1>
        <p>- TU NUEVA CAMISETA TE ESPERA -</p>
    </header>

    <div class="controles">
        <input type="text" id="buscador" placeholder="🔍 Buscar equipo, jugador, año...">
        
        <div class="botones-filtro">
            <button onclick="filtrar('todas')">Todas</button>
            <button onclick="filtrar('retros')">Retros</button>
            <button onclick="filtrar('actuales')">Actuales</button>
        </div>
    </div>

    <main id="contenedor-vitrina">
        
        <a href="cactusjack.html" class="tarjeta-portada" data-categoria="retros" data-claves="barcelona cactus jack retro 2000 2025 2026 travis scott barca">
            <img src="imagenes/barcelona_cactusjack/cactusjack_frontal.jpg" class="foto-portada" alt="Portada Cactus Jack">
            <h2>Barcelona<br>Cactus Jack</h2>
        </a>

        <a href="blackmamba.html" class="tarjeta-portada" data-categoria="actuales" data-claves="barcelona 2025 2026 kobe bryant black mamba visitante lamine raphina pedri barca">
            <img src="imagenes/barcelona_kobebryant/barcelona2frente.jpg" class="foto-portada" alt="Portada Black Mamba">
            <h2>Barcelona<br>Black Mamba (25/26)</h2>
        </a>

        <a href="bayern3.html" class="tarjeta-portada" data-categoria="actuales" data-claves="bayern munich 2025 2026 harry kane luis diaz alternativa negro">
            <img src="imagenes/bayern_alternativa/bayern3_frente.jpg" class="foto-portada" alt="Portada Bayern Munich">
            <h2>Bayern Munich<br>Alternativa 25/26</h2>
        </a>


        </main>

    <script>
        // Lógica del Buscador (Busca en los títulos h2 de las portadas)
        document.getElementById('buscador').addEventListener('keyup', function(evento) {
            let textoBusqueda = evento.target.value.toLowerCase(); 
            let portadas = document.querySelectorAll('.tarjeta-portada'); 

            portadas.forEach(function(portada) {
                let nombre = portada.querySelector('h2').innerText.toLowerCase(); 
                let claves = portada.getAttribute('data-claves') || "";
                claves = claves.toLowerCase();
                
                if (nombre.includes(textoBusqueda) || claves.includes(textoBusqueda)) {
                    portada.style.display = 'flex'; 
                } else {
                    portada.style.display = 'none'; 
                }
            });
        });

        // Lógica de Filtros (Filtra las portadas)
        function filtrar(categoriaSeleccionada) {
            let portadas = document.querySelectorAll('.tarjeta-portada');

            portadas.forEach(function(portada) {
                let categoriaCamiseta = portada.getAttribute('data-categoria');

                if (categoriaSeleccionada === 'todas' || categoriaSeleccionada === categoriaCamiseta) {
                    portada.style.display = 'flex';
                } else {
                    portada.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
